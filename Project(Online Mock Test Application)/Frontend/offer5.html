<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>October Offer | Nag's Academy</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #74ebd5, #9face6);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .offer-card {
            background: white;
            padding: 30px 40px;
            border-radius: 18px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
        }

        .offer-card img {
            width: 250px;
            max-width: 100%;
            border-radius: 15px;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.3);
            margin-bottom: 18px;
        }

        .offer-title {
            font-size: 30px;
            color: #e67e22;
            font-weight: bold;
            margin-bottom: 6px;
        }

        .offer-text {
            font-size: 20px;
            color: #2c3e50;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="offer-card">
        <div class="offer-title">🎯 15% OFF</div>
        <div class="offer-text">In October Month!</div>
    </div>

</body>
</html>
