<!DOCTYPE html>
<html>
<head>

    <title>Nag's Academy</title>

    <style>

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: #2c3e50;
            background: linear-gradient(135deg, #74ebd5, #9face6);
        }

        marquee {
            font-size: 18px;
            font-weight: bold;
            padding: 12px 0;
            background-color: rgba(255, 255, 255, 0.8);
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
            padding: 20px;
        }

        .card {
            display: flex;
            gap: 40px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            max-width: 1000px;
            width: 100%;
        }

        .left-image {
            width: auto;
            max-height: 480px;
            object-fit: contain;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            border: 4px solid #ecf0f1;
        }

        .content {
            max-width: 600px;
        }

        h1 {
            color: #2c3e50;
        }

        nav {
            background-color: #34495e;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 15px;
            font-weight: bold;
        }

        a.button {
            display: inline-block;
            margin: 8px 0;
            padding: 10px 20px;
            background-color: #2c3e50;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: 0.3s;
        }

        a.button:hover {
            background-color: #1a252f;
            transform: scale(1.05);
        }

        @media (max-width: 768px) {

            .card {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            nav a {
                display: block;
                margin: 8px 0;
            }
        }

    </style>

</head>

<body>

<marquee>
    Welcome to Nag's Academy! Here is the best site to access mock tests
</marquee>

<div class="container">

    <div class="card">

        <!-- Left Image -->

        <img src="Nags1.jpeg" alt="Nag's Academy" class="left-image">

        <!-- Right Content -->

        <div class="content">

            <h1><u>Nag's Academy</u></h1>

            <nav>

                <a href="Aboutus.html">About Us</a>

                <a href="Offers.html">Offers</a>

            </nav>

            <h1>First Register Here!</h1>

            <a href="Registration_form_updated.html" class="button">
                Click Here to Register
            </a>

            <h1>Concepts & Syllabus</h1>

            <a href="Index.html" class="button">
                View Concepts
            </a>

            <h1>Mock Tests PDF</h1>

            <a href="Mocktests.html" class="button">
                Click here to practice
            </a>

            <h1>Final Exam</h1>

            <a href="FinalTestpart1_updated.html" class="button">
                Final Test Part-1
            </a>

            <a href="FinalTest2.html" class="button">
                Final Test Part-2
            </a>

        </div>

    </div>

</div>

</body>
</html>
