<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form | Nag's Academy</title>

    <style>

        body{
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg,#74ebd5,#9face6);
        }

        h1{
            text-align: center;
            margin-top: 25px;
            color: #2c3e50;
        }

        .container{
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 85vh;
        }

        .form-card{
            width: 420px;
            background: white;
            padding: 30px 40px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
        }

        label{
            display: block;
            margin-top: 12px;
            font-size: 15px;
        }

        input[type="text"],
        input[type="email"],
        input[type="date"]{

            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .gender{
            margin-top: 15px;
        }

        .gender label{
            display: inline;
            margin-right: 15px;
        }

        .buttons{
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
        }

        input[type="submit"],
        input[type="reset"]{

            padding: 10px 22px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            color: white;
        }

        input[type="submit"]{
            background-color: green;
        }

        input[type="submit"]:hover{
            background-color: darkgreen;
        }

        input[type="reset"]{
            background-color: red;
        }

        input[type="reset"]:hover{
            background-color: darkred;
        }

        .message {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
            display: none;
        }

        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 15px 0;
            font-weight: bold;
        }

        @media(max-width:500px){

            .form-card{
                width: 90%;
                padding: 20px;
            }
        }

    </style>

</head>

<body>

    <h1>Student Registration Form</h1>

    <div class="container">

        <div class="form-card">

            <div id="message"></div>

            <form onsubmit="return submitRegistration(event)">

                <label>Username</label>
                <input type="text" id="username" required>

                <label>First Name</label>
                <input type="text" id="FirstName" required>

                <label>Last Name</label>
                <input type="text" id="LastName" required>

                <label>Email</label>
                <input type="email" id="Email" required>

                <label>Alternate Email</label>
                <input type="email" id="AltEmail" required>

                <label>Mobile Number</label>
                <input type="text" id="MobileNumber" required>

                <div class="gender">

                    <label>Gender</label>

                    <input type="radio" name="Gender" value="Male"> Male
                    <input type="radio" name="Gender" value="Female"> Female

                </div>

                <label>Date of Birth</label>
                <input type="date" id="DOB" required>

                <div class="loading" id="loading">
                    <p>Registering...</p>
                </div>

                <div class="buttons">

                    <input type="submit" value="Submit">

                    <input type="reset" value="Reset">

                </div>

            </form>

        </div>

    </div>

<script>

function validateForm(){

    let firstName = document.getElementById("FirstName").value;
    let lastName = document.getElementById("LastName").value;
    let email = document.getElementById("Email").value;
    let altEmail = document.getElementById("AltEmail").value;
    let mobile = document.getElementById("MobileNumber").value;
    let dob = document.getElementById("DOB").value;

    let gender = document.getElementsByName("Gender");
    let genderSelected = false;

    for(let i = 0; i < gender.length; i++){

        if(gender[i].checked){
            genderSelected = true;
        }
    }

    if(firstName == ""){
        showMessage("Enter First Name", "error");
        return false;
    }

    if(lastName == ""){
        showMessage("Enter Last Name", "error");
        return false;
    }

    if(email == "" || !email.includes("@")){
        showMessage("Enter Valid Email", "error");
        return false;
    }

    if(altEmail == "" || !altEmail.includes("@")){
        showMessage("Enter Valid Alternate Email", "error");
        return false;
    }

    if(mobile.length != 10 || isNaN(mobile)){
        showMessage("Enter Valid 10-digit Mobile Number", "error");
        return false;
    }

    if(!genderSelected){
        showMessage("Select Gender", "error");
        return false;
    }

    if(dob == ""){
        showMessage("Select Date of Birth", "error");
        return false;
    }

    return true;
}

function showMessage(message, type) {

    const messageDiv = document.getElementById('message');

    messageDiv.textContent = message;

    messageDiv.className = `message ${type}`;

    messageDiv.style.display = 'block';

    setTimeout(() => {

        messageDiv.style.display = 'none';

    }, 5000);
}

async function submitRegistration(event) {

    event.preventDefault();

    if (!validateForm()) {
        return false;
    }

    try {

        document.getElementById('loading').style.display = 'block';

        const fullname =
            document.getElementById("FirstName").value + " " +
            document.getElementById("LastName").value;

        const email = document.getElementById("Email").value;

        const response = await fetch("http://127.0.0.1:5000/register", {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({

                fullname: fullname,
                email: email
            })
        });

        const data = await response.json();

        alert(data.message);

        if (data.message === "Registration Successful") {

            localStorage.setItem("email", email);

            showMessage("Registration Successful", "success");

            setTimeout(() => {

                window.location.href = "Mocktests.html";

            }, 2000);
        }

        else {

            showMessage(data.message, "error");
        }

    }

    catch(error) {

        console.log(error);

        showMessage("Please try again", "error");
    }

    finally {

        document.getElementById('loading').style.display = 'none';
    }

    return false;
}

</script>

</body>
</html>
