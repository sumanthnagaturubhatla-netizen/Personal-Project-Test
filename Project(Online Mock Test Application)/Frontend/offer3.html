<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>June Offer | Nag's Academy</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #74ebd5, #9face6);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .offer-card {
            background: white;
            padding: 30px 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
            animation: fadeIn 1.2s ease-in-out;
        }

        .offer-card img {
            width: 250px;
            max-width: 100%;
            border-radius: 18px;
            box-shadow: 0 10px 22px rgba(0, 0, 0, 0.35);
            margin-bottom: 20px;
        }

        .offer-title {
            font-size: 32px;
            color: #e74c3c;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .offer-text {
            font-size: 20px;
            color: #2c3e50;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="offer-card">
        <div class="offer-title">🔥 60% OFF</div>
        <div class="offer-text">In June Month!</div>
    </div>

</body>
</html>
